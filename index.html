  }
  .store-screenshot {
    overflow-x: auto;
    padding: 0;
  }
  .store-screenshot img {
    display: block; max-width: 100%;
    min-width: 900px;
  }
  .no-screenshot {
    padding: 40px; text-align: center; color: #999; font-size: 14px;
  }
